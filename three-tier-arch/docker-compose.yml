version: '3.8'

services:
  # ==================== 第一层：对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: demo-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # 控制台端口
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - demo-network

  # ==================== 第二层：关系数据库 ====================
  postgres:
    image: postgres:15
    container_name: demo-postgres
    environment:
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
      POSTGRES_DB: chat_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - demo-network

  # ==================== 第三层：向量数据库 ====================
  # 注意：Milvus 已经在你的系统中运行
  # 容器名：milvus-standalone
  # 端口：19530 (向量), 9091 (指标)
  # 演示应用将连接到现有的 Milvus 实例

  # ==================== 演示应用 ====================
  demo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-app
    environment:
      # MinIO 配置
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: chat-files

      # PostgreSQL 配置
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
      POSTGRES_DB: chat_db

      # Milvus 配置（连接到宿主机的现有 Milvus）
      MILVUS_HOST: host.docker.internal
      MILVUS_PORT: 19530
    ports:
      - "8000:8000"
    depends_on:
      - minio
      - postgres
    volumes:
      - .:/app
    networks:
      - demo-network

networks:
  demo-network:
    driver: bridge
